<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Dog Ceo API</h1>
    <div id="dogdata"></div>
    <script>
        try{
            const dog = async()=>{
                const response = await fetch('https://dog.ceo/api/breeds/list/all')
                if(!response.ok){
                    throw new Error("Network Error")
                }
                const data = await response.json()
                const breeds = Object.keys(data.message)
                breeds.forEach(name=>{
                    const dogN = document.createElement('div')
                    dogN.innerHTML = `<h2>${name}</h2>`
                    document.getElementById('dogdata').appendChild(dogN)
                })
            }
            dog()
        }
        catch(err){
            console.error(err)
        }
    </script>
</body>
</html>
